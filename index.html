<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(255,255,255,0.08);
    --text: #f0f4ff;
    --muted: #6b7a99;
    --green: #10b981;
    --CAT: #ec4899; --CAT-bg: rgba(236,72,153,0.15);
    --MIC: #10b981; --MIC-bg: rgba(16,185,129,0.15);
    --MAR: #f59e0b; --MAR-bg: rgba(245,158,11,0.15);
    --DAN: #a855f7; --DAN-bg: rgba(168,85,247,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  .header { text-align: center; margin-bottom: 28px; }
  .header-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(30px, 6vw, 56px); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; line-height: 1; background: linear-gradient(135deg, #fff 0%, #93c5fd 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .refresh-btn { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 11px; padding: 5px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  /* Pull-to-refresh */
  #ptr-pill { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 0; pointer-events: none; -webkit-user-select: none; user-select: none; }
  #page-wrap {
    padding: 24px 16px 48px;
    background: var(--bg);
    position: relative;
    z-index: 1;
    will-change: transform;
    min-height: 100vh;
  }
  #ptr-icon { font-size: 22px; display: inline-block; color: var(--muted); will-change: transform; transition: transform 0.1s ease; }
  @keyframes ptr-spin { to { transform: rotate(360deg); } }
  #ptr-icon.ptr-spin { animation: ptr-spin 0.65s linear infinite; transition: none; }

  .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .round-section { max-width: 1120px; margin: 0 auto 8px; }
  .round-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; border-top: 1px solid var(--border); padding: 10px 4px; margin-bottom: 8px; }
  .round-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .round-toggle { font-size: 10px; color: var(--muted); transition: transform 0.2s; display: inline-block; }

<body>

<div id="ptr-pill"><span id="ptr-icon">↻</span></div>

<div id="page-wrap">
<div class="header">
  <div class="header-eyebrow">2026 NHL Postseason</div>
  <h1>Stanley Cup Playoffs</h1>
  <div class="header-sub" id="subtitle">Loading live data...</div>
  <button class="refresh-btn" onclick="render()">↻ Refresh</button>
  <button class="refresh-btn" onclick="toggleBracket()" style="margin-left:6px">🏒 Bracket</button>
</div>

<div id="legend-pie-wrap"></div>
<div id="bracket-section" style="display:none;margin-top:16px;margin-bottom:16px"></div>
<div id="tonight-wrap"></div>
<div id="main"><div class="loading">Fetching live NHL data + MoneyPuck odds...</div></div>
<div id="standings-wrap"></div>
</div>

<script>
const ODDS_API = "https://script.google.com/macros/s/AKfycbyeMYsFI6sVfRnuPJgX_6-Ev9qr7dosfnpD-T-s9UtmMoQ03fjfHy6wuY3AJ63wU2wY/exec";
const NHL_WORKER = "https://lucky-forest-af32.gamache-m.workers.dev";

const POOL = {
  CAT: ["COL","EDM","TBL","LAK"],
  MIC: ["CAR","VGK","DAL","BOS"],
  MAR: ["MIN","OTT","PHI","UTA"],
  DAN: ["BUF","MTL","PIT","ANA"]
};
const PLAYER_NAMES = { CAT:"Catherine", MIC:"Michel", MAR:"Martin", DAN:"Danica" };

// Known R1 matchups as fallback and for ordering
const R1_WEST = [
  {topTeam:"COL",bottomTeam:"LAK"},
  {topTeam:"DAL",bottomTeam:"MIN"},
  {topTeam:"VGK",bottomTeam:"UTA"},
  {topTeam:"EDM",bottomTeam:"ANA"},
];
const R1_EAST = [
  {topTeam:"BUF",bottomTeam:"BOS"},
  {topTeam:"TBL",bottomTeam:"MTL"},
  {topTeam:"CAR",bottomTeam:"OTT"},
  {topTeam:"PIT",bottomTeam:"PHI"},
];

// My player — localStorage personalization
var _poolState = {};
var _detailState = null;
var _lgoReplayData = null;
function getMyPlayer() { try { return localStorage.getItem('poolMyPlayer'); } catch(e) { return null; } }
function setMyPlayer(player) {
  try {
    if (player === getMyPlayer()) { localStorage.removeItem('poolMyPlayer'); } // tap again to deselect
    else { localStorage.setItem('poolMyPlayer', player); }
  } catch(e) {}
  _rebuildPoolUI();
}
function _rebuildPoolUI() {
  var st = _poolState;
  if (!st.pieTotals) return;
  var legendEl = document.getElementById("legend-pie-wrap");
  if (legendEl) legendEl.innerHTML = _buildLegendPieHtml(st.pieTotals, st.pieSvg);
  document.getElementById("tonight-wrap").innerHTML = buildOnTheClock(st.gamesData||[], st.oddsMap);
  document.getElementById("standings-wrap").innerHTML = buildStandings(st.oddsMap, st.historyData) + buildTeamOdds(st.oddsMap, st.roundOdds, st.historyData) + buildScoringLeaders(st.leaders, st.oddsMap);
}
function _buildLegendPieHtml(pieTotals, pieSvg) {
  var me = getMyPlayer();
  var myData = me ? pieTotals.find(function(p) { return p.player === me; }) : null;
  var myRank = me ? pieTotals.findIndex(function(p) { return p.player === me; }) + 1 : -1;
  var standingBlock = '';
  if (myData && myRank > 0) {
    var rl = ["1st","2nd","3rd","4th"][myRank-1] || (myRank+'th');
    standingBlock = '<div onclick="setMyPlayer(\''+me+'\')" style="text-align:center;padding:6px 10px;background:var(--surface);border:1.5px solid var(--'+me+');border-radius:12px;cursor:pointer;flex-shrink:0">'
      + '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:42px;font-weight:900;line-height:1;color:var(--'+me+')">'+rl+'</div>'
      + '<span class="pool-pill pill-'+me+'" style="margin-top:3px;display:inline-block">'+me+'</span>'
      + '<div style="font-size:9px;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-top:2px">'+myData.total.toFixed(1)+'%</div>'
      + '</div>';
  }
  var legendItems = pieTotals.map(function(p) {
    return '<div class="legend-item"><div class="legend-dot" style="background:var(--'+p.player+')"></div><span style="font-weight:700;color:var(--text)">'+p.player+'</span><span style="color:var(--muted);font-size:10px"> — '+p.name+'</span></div>';
  }).join('');
  return '<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;">'
    + standingBlock
    + '<div style="display:flex;align-items:center;gap:10px;">'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 8px;">'+legendItems+'</div>'
    + pieSvg + '</div></div>';
}

function getPool(team) {
  for (const [p, teams] of Object.entries(POOL)) {
    if (teams.includes(team)) return p;
  }
  return null;
}

function pill(team) {
  const p = getPool(team);
  if (!p) return `<span class="pill-empty"></span>`;
  return `<span class="pool-pill pill-${p}">${p}</span>`;
}

async function fetchHistory() {
  try {
    const res = await fetch(ODDS_API + "?action=history&t=" + Date.now(), {cache: "no-store"});
    return await res.json();
  } catch(e) { return []; }
}

async function fetchScoringLeaders() {
  try {
    const res = await fetch(ODDS_API + '?action=scoringLeaders&t=' + Date.now(), {cache:'no-store'});
    const d = await res.json();
    return d.data || [];
  } catch(e) { return []; }
}

async function fetchOdds() {
  try {
    const res = await fetch(ODDS_API + "?t=" + Date.now());
    const data = await res.json();
    const oddsMap = {}, roundOdds = {};
    for (const [k, v] of Object.entries(data)) {
      const team = k.toUpperCase().trim();
      if (typeof v === 'string') {
        oddsMap[team] = v;
      } else if (typeof v === 'object' && v !== null) {
        if (v.cup) oddsMap[team] = v.cup;
        roundOdds[team] = { r2: v.r2||'', r3: v.r3||'', r4: v.r4||'', cup: v.cup||'' };
      }
    }
    return { oddsMap, roundOdds };
  } catch(e) {
    console.warn("Odds fetch failed:", e);
    return { oddsMap: {}, roundOdds: {} };
  }
}

async function fetchAllGames() {
  try {
    const res = await fetch(NHL_WORKER + "?action=nhl&t=" + Date.now(), {cache:"no-store"});
    const data = await res.json();
    const games = [];
    for (const day of data.gamesByDate || []) {
      for (const g of day.games || []) {
        if (g.gameType !== 3) continue;
        games.push({
          id: String(g.id),
          season: String(g.season || 20252026),
          away: g.awayTeam.abbrev,
          home: g.homeTeam.abbrev,
          awayScore: g.awayTeam.score ?? null,
          homeScore: g.homeTeam.score ?? null,
          state: g.gameState,
          startUTC: g.startTimeUTC,
          period: g.periodDescriptor?.number || null,
          periodType: g.periodDescriptor?.periodType || 'REG'
        });
      }
    }
    return games;
  } catch(e) { return []; }
}
async function fetchNHL() {
  try {
    const res = await fetch(ODDS_API + "?action=scores&t=" + Date.now());
    return await res.json();
  } catch(e) { return null; }
}

function parseSeries(data) {
  // data is a flat array from Apps Script: [{letter, round, topTeam, bottomTeam, topWins, bottomWins}]
  if (!Array.isArray(data)) return null;

  const byTeams = {};

  for (const s of data) {
    const t1 = s.topTeam?.toUpperCase();
    const t2 = s.bottomTeam?.toUpperCase();
    const entry = {
      topTeam: t1 || "TBD",
      bottomTeam: t2 || "TBD",
      topWins: s.topWins ?? 0,
      bottomWins: s.bottomWins ?? 0,
      round: s.round ?? 1,
    };
    if (t1 && t2) byTeams[[t1,t2].sort().join("-")] = entry;
  }

  function findR1(t1, t2) {
    return byTeams[[t1,t2].sort().join("-")] || {topTeam:t1, bottomTeam:t2, topWins:0, bottomWins:0, round:1};
  }

  const r1w = R1_WEST.map(m => findR1(m.topTeam, m.bottomTeam));
  const r1e = R1_EAST.map(m => findR1(m.topTeam, m.bottomTeam));

  // Bracket quadrant team sets — place R2/R3 into the correct slot by team origin
  const westUpper = new Set(R1_WEST.slice(0,2).flatMap(m => [m.topTeam, m.bottomTeam]));
  const westLower = new Set(R1_WEST.slice(2,4).flatMap(m => [m.topTeam, m.bottomTeam]));
  const eastUpper = new Set(R1_EAST.slice(0,2).flatMap(m => [m.topTeam, m.bottomTeam]));
  const eastLower = new Set(R1_EAST.slice(2,4).flatMap(m => [m.topTeam, m.bottomTeam]));
  const allWest = new Set([...westUpper, ...westLower]);
  const allEast = new Set([...eastUpper, ...eastLower]);

  const r2 = [null, null, null, null];
  const r3 = [null, null];
  let r4 = null;

  for (const s of data) {
    const round = s.round ?? 1;
    if (round < 2) continue;
    const t1 = s.topTeam?.toUpperCase();
    const t2 = s.bottomTeam?.toUpperCase();
    const entry = {topTeam:t1||"TBD", bottomTeam:t2||"TBD", topWins:s.topWins??0, bottomWins:s.bottomWins??0, round};
    const teams = [t1, t2].filter(t => t && t !== "TBD");
    if (round === 2) {
      for (const t of teams) {
        if (westUpper.has(t)) { r2[0] = entry; break; }
        if (westLower.has(t)) { r2[1] = entry; break; }
        if (eastUpper.has(t)) { r2[2] = entry; break; }
        if (eastLower.has(t)) { r2[3] = entry; break; }
      }
    } else if (round === 3) {
      for (const t of teams) {
        if (allWest.has(t)) { r3[0] = entry; break; }
        if (allEast.has(t)) { r3[1] = entry; break; }
      }
    } else if (round === 4) {
      r4 = entry;
    }
  }

  return { r1w, r1e, r2, r3, r4 };
}

function fallbackParsed() {
  return {
    r1w: R1_WEST.map(m => ({...m, topWins:0, bottomWins:0, round:1})),
    r1e: R1_EAST.map(m => ({...m, topWins:0, bottomWins:0, round:1})),
    r2: [null, null, null, null],
    r3: [null, null],
    r4: null,
  };
}

function buildSeriesGames(t1, t2, gamesData) {

    return [g.away,g.home].indexOf(t1)>=0 && [g.away,g.home].indexOf(t2)>=0;
  }).sort(function(a,b){ return new Date(a.startUTC)-new Date(b.startUTC); });
  if (!games.length) return '';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return games.map(function(g,i) {
    var d=new Date(g.startUTC);
    var dET=new Date(d.getTime()-4*3600000);
    var dateStr=months[dET.getUTCMonth()]+' '+dET.getUTCDate();
    var num='<span class="game-num">G'+(i+1)+'</span>';
    var dc='<span class="game-date-col">'+dateStr+'</span>';

    if(g.state==='OFF'||g.state==='FINAL'){
      var ot=(g.periodType&&g.periodType!=='REG')?' OT':'';

      return '<div class="game-row"'+doneClick+'>'+num+dc+'<span class="game-result final">'+g.away+' '+as+' · '+hs+' '+g.home+ot+'</span>'+(g.id?'<span style="color:#374151;font-size:10px;margin-left:auto">▶&#xFE0E;</span>':'')+'</div>';
    } else if(g.state==='LIVE'||g.state==='CRIT'){
      var liveClick=g.id?(' onclick="event.stopPropagation();showLiveGameOverlay(\''+g.id+'\',\''+g.away+'\',\''+g.home+'\',\''+g.season+'\')" style="cursor:pointer"'):'';
      return '<div class="game-row"'+liveClick+'>'+num+'<span class="game-date-col" style="color:#f87171;font-weight:700">LIVE</span><span class="game-result live">'+g.away+' '+as+' · '+hs+' '+g.home+(g.period?' P'+g.period:'')+'</span><span style="color:#6b7280;font-size:10px;margin-left:auto">▶&#xFE0E;</span></div>';
    } else {
      return '<div class="game-row">'+num+dc+'<span class="game-result future">'+formatGameTime(g.startUTC)+'</span></div>';
    }

// Normalize history values — MoneyPuck sometimes returns 0.197 instead of 19.7
function normPct(v) { const n = parseFloat(v); return (n > 0 && n < 1) ? n * 100 : n; }

function deltaBadge(d) {
  if (d === null || d === undefined || d === 0) return '';
  var cls = d > 0 ? 'up' : 'down';
  var arrow = d > 0 ? '▲' : '▼';
  return `<span class="odds-delta ${cls}"><span class="delta-num">${Math.abs(d).toFixed(1)}</span>${arrow}</span>`;
}

function buildDualSparkline(histData, t1, t2, roundKey, liveVal1, liveVal2) {
  const getPoints = team => (histData||[])
    .filter(d => (d.team||'').toUpperCase() === team.toUpperCase() && d[roundKey] != null && d[roundKey] !== '')
    .sort((a,b) => (a.date||'').localeCompare(b.date||''))
    .map(d => ({ date: d.date, val: normPct(d[roundKey]) }))
    .filter(d => !isNaN(d.val));
  const pts1 = getPoints(t1), pts2 = getPoints(t2);
  if (pts1.length < 2 && pts2.length < 2) return '';
  const map1 = Object.fromEntries(pts1.map(p => [p.date, p.val]));
  const map2 = Object.fromEntries(pts2.map(p => [p.date, p.val]));
  // Inject today's live values as the final point
  const today = new Date().toISOString().substring(0,10);
  if (liveVal1 != null) map1[today] = liveVal1;
  if (liveVal2 != null) map2[today] = liveVal2;
  const allDates = [...new Set([...Object.keys(map1), ...Object.keys(map2)])].sort();
  if (allDates.length < 2) return '';

  // Filter to dates where either team shifted >= 1pp (always keep first & last)
  const THRESH = 1.0;
  const kept = [allDates[0]];
  let p1 = map1[allDates[0]] ?? null, p2 = map2[allDates[0]] ?? null;
  for (let i = 1; i < allDates.length - 1; i++) {
    const d = allDates[i];
    const v1 = map1[d] ?? p1, v2 = map2[d] ?? p2;
    const chg = Math.max(p1 !== null ? Math.abs(v1 - p1) : 0, p2 !== null ? Math.abs(v2 - p2) : 0);
    if (chg >= THRESH) {
      kept.push(d);
      if (map1[d] !== undefined) p1 = map1[d];
      if (map2[d] !== undefined) p2 = map2[d];
    }
  }
  kept.push(allDates[allDates.length - 1]);
  const useDates = [...new Set(kept)];

  const W = 200, H = 36, padX = 8, padY = 6;
  const allVals = useDates.flatMap(d => [map1[d], map2[d]].filter(v => v !== undefined));
  const min = Math.min(...allVals), max = Math.max(...allVals);
  const range = max - min || 1;
  const toCoords = map => useDates
    .filter(d => map[d] !== undefined)
    .map(d => {
      const di = useDates.indexOf(d);
      const x = padX + (di / (useDates.length - 1)) * (W - padX * 2);
      const y = padY + (H - padY * 2) * (1 - (map[d] - min) / range);
      return { x, y, val: map[d] };
    });
  const c1 = toCoords(map1), c2 = toCoords(map2);
  const polyStr = pts => pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const col1 = '#60a5fa', col2 = '#fb923c';
  const last1 = c1.length ? c1[c1.length-1] : null;
  const last2 = c2.length ? c2[c2.length-1] : null;
  const dateLabels = useDates.map((d, i) => {
    const md = d.substring(5).replace('-', '/');
    const x = padX + (i / (useDates.length - 1)) * (W - padX * 2);
    const anchor = i===0 ? 'start' : i===useDates.length-1 ? 'end' : 'middle';
    return `<text x="${x.toFixed(1)}" y="${H+9}" font-size="6.5" fill="#6b7280" text-anchor="${anchor}" font-family="monospace">${md}</text>`;
  }).join('');
  return `<div style="padding:6px 8px 4px;border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
      <span style="font-size:9px;font-weight:700;color:${col1};font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px">${t1}${last1 ? ` <span style="opacity:0.7">${last1.val.toFixed(1)}%</span>` : ''}</span>
      <span style="font-size:7px;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;opacity:0.5">win series</span>
      <span style="font-size:9px;font-weight:700;color:${col2};font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px">${last2 ? `<span style="opacity:0.7">${last2.val.toFixed(1)}%</span> ` : ''}${t2}</span>
    </div>
    <svg width="100%" viewBox="0 0 ${W} ${H+14}" preserveAspectRatio="none" style="display:block;height:44px">
      ${c1.length>=2 ? `<polyline points="${polyStr(c1)}" fill="none" stroke="${col1}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
      ${c2.length>=2 ? `<polyline points="${polyStr(c2)}" fill="none" stroke="${col2}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
      ${c1.map((p,i) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i===c1.length-1?2.5:1.8}" fill="${col1}"/>`).join('')}
      ${c2.map((p,i) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i===c2.length-1?2.5:1.8}" fill="${col2}"/>`).join('')}
      ${dateLabels}
    </svg>
  </div>`;
}

function seriesCard(s, label, oddsMap, gamesData, deltaMap, roundOdds, roundNum, histData) {

    }
    return `<div class="series">
      <div class="series-header"><div class="series-round">${label}</div></div>
      ${predSlotRow(t1, false)}
      ${predSlotRow(t2, true)}
    </div>`;
  }
  const {topTeam:t1, bottomTeam:t2, topWins:w1, bottomWins:w2} = s;
  const t1won = w1===4, t2won = w2===4;
  const o1 = oddsMap[t1] || "";
  const o2 = oddsMap[t2] || "";
  const d1 = deltaMap ? deltaMap[t1] : null;
  const d2 = deltaMap ? deltaMap[t2] : null;
  const logoBase = 'https://assets.nhle.com/logos/nhl/svg/';
  const sid = (t1+'-'+t2).toLowerCase();
  const roundKey = {1:'r2',2:'r3',3:'r4',4:'cup'}[roundNum] || 'r2';
  const sr1 = roundOdds?.[t1]?.[roundKey] || '';
  const sr2 = roundOdds?.[t2]?.[roundKey] || '';
  const lv1 = roundOdds?.[t1]?.[roundKey] ? parseFloat((roundOdds[t1][roundKey]||'0%').replace('%','')) : null;
  const lv2 = roundOdds?.[t2]?.[roundKey] ? parseFloat((roundOdds[t2][roundKey]||'0%').replace('%','')) : null;
  const dualSpark = buildDualSparkline(histData, t1, t2, roundKey, lv1, lv2);
  const seriesHeader = (!dualSpark && (sr1||sr2)) ? `<div class="series-odds-header"><span class="soh-team">${t1}</span>&nbsp;<span class="soh-pct">${sr1}</span><span style="margin:0 4px;opacity:0.3">·</span><span class="soh-team">${t2}</span>&nbsp;<span class="soh-pct">${sr2}</span><span style="flex:1"></span>win</div>` : '';
  const isLive = isSeriesLive(gamesData, t1, t2);
  const liveDot = isLive ? '<span class="live-dot"></span>' : '';
  const t1isPred = t1 && t1.includes('/');
  const t2isTBD = !t2 || t2 === 'TBD';
  const t2isPred = t2 && t2.includes('/');
  function predSlotHtml(team, borderTop) {
    const [pa, pb] = team.split('/');
    const oa = roundOdds?.[pa]?.r2 || '';
    const ob = roundOdds?.[pb]?.r2 || '';

    return `<div class="tbd-row" style="${bt}display:flex;align-items:center;justify-content:center;gap:2px">`
      + `<span style="opacity:0.6;font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:14px">${pa}</span>`

    ? `<div class="tbd-row" style="border-top:1px solid var(--border)"><span class="tbd-text">TBD</span></div>`
    : t2isPred
      ? predSlotHtml(t2, true)

  const row1 = t1isPred
    ? predSlotHtml(t1, false)

      ${pill(t1)}
      <img class="tlogo" src="${logoBase}${t1}_light.svg" onerror="this.style.display='none'">
      <span class="team-name ${t2won?'eliminated':''} ${t1won?'champion':''}">${t1}</span>
      <div class="odds-wrap">${deltaBadge(d1)}${o1?`<span class="team-odds">${o1}</span>`:''}</div>
      <span class="team-wins ${w1>w2?'leading':''}">${w1}</span>
    </div>`;
  return `<div class="series${isLive?' live-series':''}" onclick="toggleSeriesGames('${sid}')">
    <div class="series-header"><div class="series-header-inner"><div class="series-round">${liveDot}${label}</div>${getGameBadge(gamesData,t1,t2)}</div></div>
    ${row1}
    ${row2}
    <div class="series-games" id="sg-${sid}">${dualSpark ? `<div onclick="event.stopPropagation();showSeriesSparklineDetail('${t1}','${t2}',${roundNum})" style="cursor:pointer;border-radius:8px 8px 0 0;transition:background .15s" onmouseenter="this.style.background='rgba(255,255,255,0.04)'" onmouseleave="this.style.background=''">${dualSpark}</div>` : ''}${seriesHeader}${buildSeriesGames(t1,t2,gamesData)}</div>
  </div>`;
}



function buildPieChart(totals) {
  var colors = {"CAT":"#ec4899","MIC":"#10b981","MAR":"#f59e0b","DAN":"#a855f7"};
  var grand = totals.reduce(function(a,p){return a+p.total;},0);
  if (grand === 0) return "";
  var cx=40, cy=40, r=34, start=0, gap=0.04;
  var slices = "";
  totals.forEach(function(p) {
    var pct = p.total/grand;
    var angle = pct*2*Math.PI;
    var s2 = start+gap/2, a2 = angle-gap;
    if (a2 < 0.01){start+=angle;return;}
    var x1=cx+r*Math.sin(s2), y1=cy-r*Math.cos(s2);
    var x2=cx+r*Math.sin(s2+a2), y2=cy-r*Math.cos(s2+a2);
    var large=a2>Math.PI?1:0;
    var col=colors[p.player]||"#6b7a99";
    slices+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+col+'"/>';
    start+=angle;
  });
  return '<svg width="44" height="44" viewBox="0 0 80 80" style="flex-shrink:0">'+slices+'</svg>';
}

function buildPlayerSparkline(histData, teams, colorVar, liveTotal, W, H) {
  if (!histData || histData.length < 2) return '';
  const dates = [...new Set(histData.map(d => d.date).filter(Boolean))].sort();
  if (dates.length < 2) return '';
  const today = new Date().toISOString().substring(0,10);
  const points = dates.map(date => {
    if (date === today && liveTotal != null) return liveTotal;
    const val = teams.reduce((sum, team) => {
      const e = histData.find(d => d.date === date && (d.team||'').toUpperCase() === team.toUpperCase());
      return sum + (e ? parseFloat(e.cup)||0 : 0);
    }, 0);
    return val;
  });
  if (!dates.includes(today) && liveTotal != null) { dates.push(today); points.push(liveTotal); }
  const min = Math.min(...points), max = Math.max(...points);
  const range = max - min || 1;
  W = W || 160; H = H || 28;
  const padX = 4, padY = 4;
  const xs = points.map((_, i) => padX + (i / (points.length - 1)) * (W - padX * 2));
  const ys = points.map(v => padY + (H - padY * 2) * (1 - (v - min) / range));
  const poly = xs.map((x,i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `M${xs[0].toFixed(1)},${H} ` + xs.map((x,i) => `L${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ') + ` L${xs[xs.length-1].toFixed(1)},${H} Z`;
  const trend = points[points.length-1] - points[0];
  const stroke = trend > 0.5 ? '#4ade80' : trend < -0.5 ? '#f87171' : '#9ca3af';
  const gradId = 'psg-' + colorVar + (W !== 160 ? '-lg' : '');
  const dotR = H > 30 ? 3 : 1.5;
  const dots = xs.map((x,i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${i===points.length-1?dotR+1:dotR}" fill="${stroke}"/>`).join('');
  const svgH = H > 30 ? H + 'px' : '32px';
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;height:${svgH};margin-top:6px">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${stroke}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${stroke}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gradId})"/>
    <polyline points="${poly}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

function computePlayerStreak(histData, teams, liveTotal) {
  if (!histData || histData.length < 2) return null;
  const dates = [...new Set(histData.map(d => d.date).filter(Boolean))].sort();
  if (dates.length < 2) return null;
  const today = new Date().toISOString().substring(0,10);
  const points = dates.map(date => {
    if (date === today && liveTotal != null) return liveTotal;
    return teams.reduce((sum, team) => {
      const e = histData.find(d => d.date === date && (d.team||'').toUpperCase() === team.toUpperCase());
      return sum + (e ? parseFloat(e.cup)||0 : 0);
    }, 0);
  });
  if (!dates.includes(today) && liveTotal != null) points.push(liveTotal);
  if (points.length < 2) return null;
  const n = points.length - 1;
  const lastDiff = points[n] - points[n-1];
  if (Math.abs(lastDiff) < 0.05) return null;
  const dir = lastDiff > 0 ? 1 : -1;
  let count = 1;
  for (let i = n - 1; i >= 1; i--) {
    const diff = points[i] - points[i-1];
    if (Math.abs(diff) < 0.05) break;
    if ((diff > 0 ? 1 : -1) === dir) count++;
    else break;
  }
  return count >= 2 ? {dir: dir > 0 ? 'up' : 'down', days: count} : null;
}

function buildStreakBadge(histData, teams, liveTotal) {
  const streak = computePlayerStreak(histData, teams, liveTotal);
  if (!streak) return '';
  const isUp = streak.dir === 'up';
  const arrow = isUp ? '▲' : '▼';
  const fire = isUp && streak.days >= 3 ? ' 🔥' : '';
  const color = isUp ? '#4ade80' : '#f87171';
  const bg = isUp ? 'rgba(74,222,128,0.12)' : 'rgba(248,113,113,0.12)';
  return `<div class="streak-badge" style="color:${color};background:${bg};border-color:${color}33">${arrow}${streak.days} DAYS${fire}</div>`;
}

function buildDetailChart(histData, series, gradId) {
  if (!histData || histData.length < 2 || !series || !series.length) return '';
  var today = new Date().toISOString().substring(0,10);
  var dates = [...new Set(histData.map(function(d){return d.date;}).filter(Boolean))].sort();
  if (!dates.includes(today)) dates.push(today);
  if (dates.length < 2) return '';

  var allSeries = series.map(function(s) {
    var pts = dates.map(function(date) {
      if (date === today && s.liveTotal != null) return s.liveTotal;
      return s.teams.reduce(function(sum, team) {
        var e = histData.find(function(d){return d.date===date&&(d.team||'').toUpperCase()===team.toUpperCase();});
        return sum+(e?parseFloat(e.cup)||0:0);
      }, 0);
    });
    return {teams:s.teams, color:s.color, liveTotal:s.liveTotal, isPrimary:s.isPrimary, points:pts};
  });

  var allPts = allSeries.reduce(function(acc,s){return acc.concat(s.points);}, []);
  var dataMin=Math.min.apply(null,allPts), dataMax=Math.max.apply(null,allPts);
  var pad=Math.max(2,(dataMax-dataMin)*0.25);
  var yMin=Math.max(0,dataMin-pad), yMax=Math.min(100,dataMax+pad);
  if(yMax===yMin){yMin=Math.max(0,yMin-5);yMax=Math.min(100,yMax+5);}

  var W=340,H=190,padL=30,padR=10,padT=20,padB=38;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=dates.length;
  function gx(i){return padL+(n>1?(i/(n-1))*cW:cW/2);}
  function gy(v){return padT+cH*(1-(v-yMin)/(yMax-yMin));}

  var rawRange=yMax-yMin;
  var niceSteps=[0.5,1,2,5,10,15,20,25,50];
  var step=niceSteps.find(function(s){return rawRange/s<=5;}) || 25;
  var gridVals=[];
  for(var g=Math.ceil(yMin/step)*step; g<=yMax+0.001; g+=step) gridVals.push(Math.round(g*10)/10);
  var grid=gridVals.map(function(v){
    var y=gy(v).toFixed(1);
    return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>'
      +'<text x="'+(padL-4)+'" y="'+(gy(v)+3.5).toFixed(1)+'" text-anchor="end" font-size="8" font-family="Barlow Condensed,sans-serif" fill="#4b5563">'+v+'%</text>';
  }).join('');

  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtD(d){
    if(d===today)return'Now';
    var p=d.split('-');return months[parseInt(p[1])-1]+' '+parseInt(p[2]);
  }
  var dateEls=dates.map(function(d,i){
    var x=gx(i),baseY=padT+cH+5;
    return '<text transform="rotate(-40,'+x.toFixed(1)+','+baseY+')" x="'+x.toFixed(1)+'" y="'+baseY+'" text-anchor="end" font-size="11" font-family="Barlow Condensed,sans-serif" fill="#6b7280">'+fmtD(d)+'</text>';
  }).join('');

  var solo = series.length === 1;
  var nonPrimary = allSeries.filter(function(s){return !s.isPrimary;});
  var primary = allSeries.filter(function(s){return s.isPrimary;});
  var renderOrder = nonPrimary.concat(primary);

  var defs='<defs>';
  var paths='';
  renderOrder.forEach(function(s) {
    var pts=s.points;
    var linePts=pts.map(function(v,i){return gx(i).toFixed(1)+','+gy(v).toFixed(1);}).join(' ');
    if (s.isPrimary) {
      var gid=gradId||'sdg-p';
      defs+='<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'
        +'<stop offset="0%" stop-color="'+s.color+'" stop-opacity="0.2"/>'
        +'<stop offset="100%" stop-color="'+s.color+'" stop-opacity="0"/>'
        +'</linearGradient>';
      var areaD='M'+gx(0).toFixed(1)+','+(padT+cH)+' '
        +pts.map(function(v,i){return'L'+gx(i).toFixed(1)+','+gy(v).toFixed(1);}).join(' ')
        +' L'+gx(n-1).toFixed(1)+','+(padT+cH)+' Z';
      paths+='<path d="'+areaD+'" fill="url(#'+gid+')"/>';
    }
    paths+='<polyline points="'+linePts+'" fill="none" stroke="'+s.color+'" stroke-width="'+(s.isPrimary?2:1.5)+'" stroke-linecap="round" stroke-linejoin="round" opacity="'+(s.isPrimary?1:0.7)+'"/>';
    pts.forEach(function(v,i) {
      var x=gx(i),y=gy(v),isLast=i===n-1;
      paths+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(isLast?4:s.isPrimary?3:2.5)+'" fill="'+s.color+'" opacity="'+(s.isPrimary?1:0.75)+'"/>';
      if (solo) {
        var lY=(i%2===0)?(y-7):(y+13);
        if(y-7<padT)lY=y+13;
        if(lY>padT+cH-2)lY=y-7;
        paths+='<text x="'+x.toFixed(1)+'" y="'+lY.toFixed(1)+'" text-anchor="middle" font-size="8.5" font-family="Barlow Condensed,sans-serif" fill="'+s.color+'" font-weight="'+(isLast?'700':'400')+'">'+v.toFixed(1)+'%</text>';
      } else if (isLast) {
        var lY2=y-8; if(lY2<padT)lY2=y+12;
        paths+='<text x="'+x.toFixed(1)+'" y="'+lY2.toFixed(1)+'" text-anchor="middle" font-size="8.5" font-family="Barlow Condensed,sans-serif" fill="'+s.color+'" font-weight="700">'+v.toFixed(1)+'%</text>';
      }
    });
  });
  defs+='</defs>';

  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block">'
    +defs+grid+paths+dateEls+'</svg>';
}

function toggleDetailPlayer(player) {
  if (!_detailState || player === _detailState.primary) return;
  if (_detailState.visible.has(player)) {
    _detailState.visible.delete(player);
  } else {
    _detailState.visible.add(player);
  }
  var series = _detailState.allPlayers
    .filter(function(p){return _detailState.visible.has(p.player);})
    .map(function(p){return {teams:p.teams, color:p.color, liveTotal:p.liveTotal, isPrimary:p.player===_detailState.primary};});
  var wrap = document.getElementById('sdg-chart-wrap');
  if (wrap) wrap.innerHTML = buildDetailChart(_detailState.hist, series, 'sdg-'+_detailState.primary);
  _detailState.allPlayers.forEach(function(p) {
    var pill = document.getElementById('sdg-pill-'+p.player);
    if (pill) pill.style.opacity = _detailState.visible.has(p.player) ? '1' : '0.28';
  });
}

function buildSeriesDetailChart(histData, t1, t2, roundKey, lv1, lv2) {
  var getMap = function(team) {
    var map = {};
    (histData||[])
      .filter(function(d){ return (d.team||'').toUpperCase()===team.toUpperCase() && d[roundKey]!=null && d[roundKey]!==''; })
      .sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); })
      .forEach(function(d){ map[d.date] = normPct(d[roundKey]); });
    return map;
  };
  var map1=getMap(t1), map2=getMap(t2);
  var today=new Date().toISOString().substring(0,10);
  if (lv1!=null) map1[today]=lv1;
  if (lv2!=null) map2[today]=lv2;
  var allDates=[...new Set([...Object.keys(map1),...Object.keys(map2)])].sort();
  if (allDates.length<2) return '';
  var THRESH=1.0, kept=[allDates[0]], fp1=map1[allDates[0]]!=null?map1[allDates[0]]:null, fp2=map2[allDates[0]]!=null?map2[allDates[0]]:null;
  for (var ki=1; ki<allDates.length-1; ki++) {
    var kd=allDates[ki], kv1=map1[kd]!=null?map1[kd]:fp1, kv2=map2[kd]!=null?map2[kd]:fp2;
    var kchg=Math.max(fp1!=null?Math.abs(kv1-fp1):0, fp2!=null?Math.abs(kv2-fp2):0);
    if (kchg>=THRESH){kept.push(kd);if(map1[kd]!=null)fp1=map1[kd];if(map2[kd]!=null)fp2=map2[kd];}
  }
  if (allDates.length>1) kept.push(allDates[allDates.length-1]);
  allDates=[...new Set(kept)];
  var v1arr=[], v2arr=[], last1=null, last2=null;
  allDates.forEach(function(d){
    if (map1[d]!=null) last1=map1[d];
    if (map2[d]!=null) last2=map2[d];
    v1arr.push(last1); v2arr.push(last2);
  });
  var allVals=[...v1arr,...v2arr].filter(function(v){return v!=null;});
  if (!allVals.length) return '';
  var dataMin=Math.min.apply(null,allVals), dataMax=Math.max.apply(null,allVals);
  var pad=Math.max(3,(dataMax-dataMin)*0.25);
  var yMin=Math.max(0,dataMin-pad), yMax=Math.min(100,dataMax+pad);
  if (yMax===yMin){yMin=Math.max(0,yMin-10);yMax=Math.min(100,yMax+10);}
  var W=340,H=185,padL=32,padR=12,padT=18,padB=40;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=allDates.length;
  function gx(i){return padL+(n>1?(i/(n-1))*cW:cW/2);}
  function gy(v){return padT+cH*(1-(v-yMin)/(yMax-yMin));}
  var rawRange=yMax-yMin;
  var niceSteps=[1,2,5,10,15,20,25,50];
  var step=niceSteps.find(function(s){return rawRange/s<=5;})||25;
  var gridVals=[];
  for (var g=Math.ceil(yMin/step)*step; g<=yMax+0.001; g+=step) gridVals.push(Math.round(g*10)/10);
  var grid=gridVals.map(function(v){
    var y=gy(v).toFixed(1);
    return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>'
      +'<text x="'+(padL-4)+'" y="'+(gy(v)+3.5).toFixed(1)+'" text-anchor="end" font-size="8" font-family="Barlow Condensed,sans-serif" fill="#4b5563">'+v+'%</text>';
  }).join('');
  var ref50=(yMin<=50&&yMax>=50)
    ?'<line x1="'+padL+'" y1="'+gy(50).toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy(50).toFixed(1)+'" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,3"/>'
    :'';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtD(d){ if(d===today)return'Now'; var p=d.split('-');return months[parseInt(p[1])-1]+' '+parseInt(p[2]); }
  var dateEls=allDates.map(function(d,i){
    var x=gx(i), baseY=padT+cH+8;
    return '<text transform="rotate(-40,'+x.toFixed(1)+','+baseY+')" x="'+x.toFixed(1)+'" y="'+baseY+'" text-anchor="end" font-size="9" font-family="Barlow Condensed,sans-serif" fill="#6b7280">'+fmtD(d)+'</text>';
  }).join('');
  var col1='#60a5fa', col2='#fb923c';
  function buildLine(varr, col) {
    var pts=[];
    varr.forEach(function(v,i){if(v!=null)pts.push({x:gx(i),y:gy(v)});});
    if (pts.length<2) return '';
    var poly=pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
    var dots=pts.map(function(p,j){
      return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(j===pts.length-1?3:2)+'" fill="'+col+'"/>';
    }).join('');
    return '<polyline points="'+poly+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+dots;
  }
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block">'
    +grid+ref50+buildLine(v1arr,col1)+buildLine(v2arr,col2)+dateEls+'</svg>';
}

function showRoundupOverlay() {
  var st = _poolState;
  if (!st.pieTotals || !st.gamesData) return;

  function etDate(utcStr) {
    var d = new Date(new Date(utcStr).getTime() - 4*60*60*1000);
    return d.toISOString().slice(0,10);
  }
  var etNow = new Date(Date.now() - 4*60*60*1000);
  var todayET = etNow.toISOString().slice(0,10);
  var yesterdayET = new Date(etNow.getTime() - 86400000).toISOString().slice(0,10);

  var yesterdayGames = st.gamesData.filter(function(g){ return g.startUTC && etDate(g.startUTC)===yesterdayET && (g.state==='OFF'||g.state==='FINAL'); });
  var tonightGames   = st.gamesData.filter(function(g){ return g.startUTC && etDate(g.startUTC)===todayET   && (g.state==='FUT'||g.state==='PRE'); });

  var dateLabel = new Date(yesterdayET + 'T12:00:00Z').toLocaleDateString('en-US',{month:'long',day:'numeric',timeZone:'UTC'});
  var lines = ['🏒 PLAYOFF ROUNDUP — ' + dateLabel, ''];

  if (yesterdayGames.length === 0) {
    lines.push('No playoff games yesterday.');
    lines.push('');
  } else {
    yesterdayGames.forEach(function(g) {
      var isOT = g.periodType==='OT' || (g.period > 3 && g.periodType!=='SO');
      var isSO = g.periodType==='SO';
      var suffix = isSO?' (SO)':isOT?' (OT)':'';
      lines.push(g.away+' '+g.awayScore+' · '+g.home+' '+g.homeScore+suffix);
      var series = getSeriesForTeams(g.away, g.home);
      var winner=null, loser=null;
      if (series) {
        var w1=series.topWins, w2=series.bottomWins;
        var isOver = w1===4 || w2===4;
        if (isOver) {
          winner = w1===4 ? series.topTeam : series.bottomTeam;
          loser  = w1===4 ? series.bottomTeam : series.topTeam;
          var ww=Math.max(w1,w2), lw=Math.min(w1,w2);
          lines.push(winner+' wins '+ww+'-'+lw);
        } else {
          var seriesStr = w1===w2 ? 'Series tied '+w1+'-'+w2 : (w1>w2?series.topTeam:series.bottomTeam)+' leads '+Math.max(w1,w2)+'-'+Math.min(w1,w2);
          lines.push(seriesStr);
        }
      }
      var p1=getTeamOwner(g.away), p2=getTeamOwner(g.home);
      var o1=parseFloat((st.oddsMap[g.away]||'0%').replace('%','')), o2=parseFloat((st.oddsMap[g.home]||'0%').replace('%',''));
      var dm=st.deltaMap||{};
      var arr=function(t){var d=dm[t];return d>0?' ▲':d<0?' ▼':''};
      var fmt=function(team,odds,player){
        if(team===loser) return team+' eliminated'+(player?' ('+player+')':'');
        return team+arr(team)+' at '+odds.toFixed(1)+'%'+(player?' ('+player+')':'');
      };
      lines.push(fmt(g.away,o1,p1)+', '+fmt(g.home,o2,p2));
      lines.push('');
    });
  }

  // compute prev-day player totals from historyData
  var prevTotals = {};
  if (st.historyData && st.historyData.length > 0) {
    var todayStr2 = new Date().toISOString().slice(0,10);
    var prevDates = [...new Set(st.historyData.map(function(r){return r.date;}).filter(Boolean))].sort().filter(function(d){return d<todayStr2;});
    var prevDate = prevDates[prevDates.length-1];
    if (prevDate) {
      var prevSnaps = st.historyData.filter(function(r){return r.date===prevDate;});
      Object.entries(POOL).forEach(function(kv){
        var player=kv[0], teams=kv[1];
        prevTotals[player] = teams.reduce(function(sum,t){
          var snap=prevSnaps.find(function(r){return r.team===t;});
          return sum + (snap ? parseFloat(snap.cup)||0 : 0);
        },0);
      });
    }
  }

  lines.push('——————————————');
  lines.push('STANDINGS');
  ['🥇','🥈','🥉','4️⃣'].forEach(function(e,i){
    var p=st.pieTotals[i];
    if(!p) return;
    var prev=prevTotals[p.player];
    var arrow = prev!=null ? (p.total>prev+0.05?' ▲':p.total<prev-0.05?' ▼':'') : '';
    lines.push(e+' '+p.name+' —'+arrow+' '+p.total.toFixed(1)+'%');
  });

  if (tonightGames.length > 0) {
    lines.push('');
    lines.push('——————————————');
    lines.push('TONIGHT');
    tonightGames.forEach(function(g) {
      var series = getSeriesForTeams(g.away, g.home);
      var ctx = '';
      if (series) {
        var w1=series.topWins,w2=series.bottomWins;
        ctx = w1===w2 ? ' (tied '+w1+'-'+w2+')' : ' ('+(w1>w2?series.topTeam:series.bottomTeam)+' leads '+Math.max(w1,w2)+'-'+Math.min(w1,w2)+')';
      }
      var timeStr='';
      try { timeStr=' · '+new Date(g.startUTC).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York',hour12:true})+' ET'; } catch(e){}
      lines.push('🏒 '+g.away+' vs '+g.home+ctx+timeStr);
    });
  }

  var text = lines.join('\n');
  var overlay = document.createElement('div');
  overlay.id = 'roundup-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10000;background:#0d1117;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;box-sizing:border-box;';
  overlay.innerHTML = '<div style="max-width:460px;margin:0 auto">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:20px;font-weight:900;letter-spacing:1px;color:#f9fafb">📋 ROUNDUP</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="roundup-copy-btn" style="background:#3b82f6;border:none;color:#fff;font-family:Inter,sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer">Copy</button>'
    +'<button onclick="document.getElementById(\'roundup-overlay\').remove()" style="background:rgba(255,255,255,0.08);border:none;color:#9ca3af;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif;font-size:12px">✕</button>'
    +'</div></div>'
    +'<textarea id="roundup-text" readonly style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#f9fafb;font-family:monospace;font-size:12px;line-height:1.7;padding:14px;min-height:420px;resize:none;outline:none;"></textarea>'
    +'</div>';
  document.body.appendChild(overlay);
  document.getElementById('roundup-text').value = text;
  document.getElementById('roundup-copy-btn').onclick = function() {
    navigator.clipboard.writeText(text).then(function(){
      var b=document.getElementById('roundup-copy-btn'); b.textContent='✓ Copied!';
      setTimeout(function(){b.textContent='Copy';},2000);
    });
  };
}

function getTeamOwner(team) {
  for (const [player, teams] of Object.entries(POOL)) {
    if (teams.includes(team)) return player;

function buildPathToCup(teams, oddsMap, playerKey) {
  const bars = teams
    .map(t => ({ t, pct: parseFloat((oddsMap[t]||'0%').replace('%','')) }))
    .sort((a,b) => b.pct - a.pct);
  if (bars.every(x => x.pct === 0)) return '';
  const alive = bars.filter(x => x.pct >= 0.1);
  const max = alive.length ? alive[0].pct : Math.max(...bars.map(x => x.pct), 0.1);
  const color = `var(--${playerKey})`;
  return `<div style="margin-top:7px;display:flex;flex-direction:column;gap:4px;padding:0 2px">
    ${bars.map(({t, pct}) => {
      const isElim = pct < 0.1;
      const w = isElim ? Math.max(4, Math.round((pct/max)*100)) : Math.round((pct/max)*100);
      return `<div class="ptc-bar-row"${isElim ? ' style="opacity:0.45"' : ''}>
        <span class="ptc-label" style="width:22px;text-align:right">${t}</span>
        <div class="ptc-bar-track"><div class="ptc-bar-fill" style="width:${w}%;background:${isElim ? 'rgba(156,163,175,0.5)' : color}"></div></div>
        <span class="ptc-label" style="width:30px">${pct.toFixed(1)}%</span>
      </div>`;
    }).join('')}
  </div>`;
}

function buildRaceSparkline(histData, oddsMap) {
  if (!histData || histData.length < 2) return '';
  var today = new Date().toISOString().substring(0,10);
  var dates = [...new Set(histData.map(function(d){return d.date;}).filter(Boolean))].sort();
  if (!dates.includes(today)) dates.push(today);
  if (dates.length < 2) return '';

  var players = Object.keys(POOL).map(function(p) {
    var teams = POOL[p];
    var pts = dates.map(function(date) {
      if (date === today) return teams.reduce(function(sum,t){return sum+parseFloat((oddsMap[t]||'0%').replace('%',''));},0);
      return teams.reduce(function(sum,team){
        var e=histData.find(function(d){return d.date===date&&(d.team||'').toUpperCase()===team.toUpperCase();});
        return sum+(e?parseFloat(e.cup)||0:0);
      },0);
    });
    return {player:p, points:pts};
  });

  var allPts=players.reduce(function(acc,p){return acc.concat(p.points);},[]);
  var dataMin=Math.min.apply(null,allPts), dataMax=Math.max.apply(null,allPts);
  var pad=Math.max(1,(dataMax-dataMin)*0.15);
  var yMin=Math.max(0,dataMin-pad), yMax=Math.min(100,dataMax+pad);
  if(yMax===yMin){yMin=0;yMax=50;}

  var W=320,H=72,padL=4,padR=42,padT=6,padB=6;
  var cW=W-padL-padR, cH=H-padT-padB, n=dates.length;
  function gx(i){return padL+(n>1?(i/(n-1))*cW:cW/2);}
  function gy(v){return padT+cH*(1-(v-yMin)/(yMax-yMin));}

  var labels=players.map(function(p){
    return {player:p.player, y:gy(p.points[p.points.length-1])};
  }).sort(function(a,b){return a.y-b.y;});
  for(var i=1;i<labels.length;i++){if(labels[i].y-labels[i-1].y<12)labels[i].y=labels[i-1].y+12;}
  var labelY={};labels.forEach(function(l){labelY[l.player]=l.y;});

  var lines=players.map(function(p){
    var linePts=p.points.map(function(v,i){return gx(i).toFixed(1)+','+gy(v).toFixed(1);}).join(' ');
    var lx=gx(n-1), dotY=gy(p.points[p.points.length-1]);
    return '<polyline points="'+linePts+'" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
      +'<circle cx="'+lx.toFixed(1)+'" cy="'+dotY.toFixed(1)+'" r="2.5" fill="rgba(255,255,255,0.25)"/>'
      +'<text x="'+(lx+6).toFixed(1)+'" y="'+(labelY[p.player]+4).toFixed(1)+'" font-size="9.5" font-weight="700" font-family="Barlow Condensed,sans-serif" style="fill:var(--'+p.player+')">'+p.player+'</text>';
  }).join('');

  return '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);opacity:0.45">'
    +'<svg width="85%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible;margin:0 auto">'+lines+'</svg></div>';
}

function buildOnTheClock(gamesData, oddsMap) {
  if (!gamesData || !gamesData.length) return '';
  var etNow = new Date(Date.now() - 4*60*60*1000);
  var todayET = etNow.toISOString().slice(0,10);
  var tonight = gamesData.filter(function(g) {
    if (!g.startUTC) return false;
    var d = new Date(new Date(g.startUTC).getTime() - 4*60*60*1000);
    return d.toISOString().slice(0,10) === todayET && (g.state==='FUT'||g.state==='PRE'||g.state==='LIVE'||g.state==='CRIT'||g.state==='OFF'||g.state==='FINAL');
  });
  if (!tonight.length) return '';
  var html = '<div style="margin-bottom:16px;background:rgba(255,255,255,0.03);border-radius:12px;border-left:3px solid #3b82f6;padding:12px 14px">';
  html += '<div style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.8px;margin-bottom:8px;text-transform:uppercase">🏒 Tonight</div>';
  tonight.forEach(function(g, i) {
    var awayOwner = getPool(g.away), homeOwner = getPool(g.home);
    var awayCup = parseFloat((oddsMap[g.away]||'0%').replace('%',''));
    var homeCup = parseFloat((oddsMap[g.home]||'0%').replace('%',''));
    var timeStr = '';
    try { timeStr = new Date(g.startUTC).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York',hour12:true})+' ET'; } catch(e){}
    var isLive = g.state==='LIVE'||g.state==='CRIT';
    var isFinal = g.state==='OFF'||g.state==='FINAL';
    var hasScore = g.awayScore != null && g.homeScore != null;
    var periodLabel = '';
    if (isLive && g.period) {
      var pt = g.periodType || 'REG';
      periodLabel = pt==='OT'?'OT':pt==='SO'?'SO':('P'+g.period);
    }
    var borderTop = i > 0 ? 'border-top:1px solid rgba(255,255,255,0.05);margin-top:6px;padding-top:6px;' : '';
    var cursor = g.id ? 'cursor:pointer;' : '';
    var onclick = g.id ? ' onclick="showLiveGameOverlay(\''+g.id+'\',\''+g.away+'\',\''+g.home+'\',\''+g.season+'\')"' : '';
    html += '<div'+onclick+' style="display:flex;align-items:center;gap:7px;'+borderTop+cursor+'">';
    // Status column
    if (isLive) {
      html += '<div style="flex-shrink:0;min-width:48px">';
      html += '<div style="font-size:10px;color:#f87171;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.3px;display:flex;align-items:center"><span class="live-dot"></span>LIVE</div>';
      if (periodLabel) html += '<div style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif">'+periodLabel+'</div>';
      html += '</div>';
    } else if (isFinal) {
      html += '<span style="font-size:10px;color:#6b7280;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;flex-shrink:0;letter-spacing:.3px">FINAL</span>';
    } else {
      html += '<span style="font-size:11px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;flex-shrink:0">'+timeStr+'</span>';
    }
    // Away side
    html += '<img src="https://assets.nhle.com/logos/nhl/svg/'+g.away+'_light.svg" style="width:22px;height:22px;object-fit:contain;flex-shrink:0" onerror="this.style.display=\'none\'">';
    html += '<span style="font-size:15px;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;color:#f9fafb">'+g.away+'</span>';
    if (awayOwner) html += '<span class="pool-pill pill-'+awayOwner+'" style="font-size:9px;padding:0 5px">'+awayOwner+'</span>';
    html += '<span style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif">'+awayCup.toFixed(1)+'%</span>';
    // Score or vs
    if ((isLive || isFinal) && hasScore) {
      html += '<span style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:18px;color:#f9fafb;flex-shrink:0">'+g.awayScore+' <span style="color:#374151;font-weight:400">·</span> '+g.homeScore+'</span>';
    } else {
      html += '<span style="font-size:11px;color:#374151;font-family:\'Barlow Condensed\',sans-serif;flex-shrink:0">vs</span>';
    }
    // Home side
    html += '<span style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif">'+homeCup.toFixed(1)+'%</span>';
    if (homeOwner) html += '<span class="pool-pill pill-'+homeOwner+'" style="font-size:9px;padding:0 5px">'+homeOwner+'</span>';
    html += '<span style="font-size:15px;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;color:#f9fafb">'+g.home+'</span>';
    html += '<img src="https://assets.nhle.com/logos/nhl/svg/'+g.home+'_light.svg" style="width:22px;height:22px;object-fit:contain;flex-shrink:0" onerror="this.style.display=\'none\'">';
    if (g.id) html += '<span style="font-size:11px;color:#4b5563;margin-left:auto;flex-shrink:0">&#9654;&#xFE0E;</span>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function lgoReplayScrub(val) {
  val = parseInt(val);
  var d = _lgoReplayData;
  if (!d || !d.timeline) return;
  var sub = d.timeline.slice(0, val + 1);
  var last = sub[sub.length - 1];
  var t = last ? last.t : 0;
  var subGoals = (d.goals||[]).filter(function(g){return g.t<=t;});
  var chartEl = document.getElementById('lgo-chart-container');
  if (chartEl) chartEl.innerHTML = buildWinProbChart(sub, subGoals);
  var shotEl = document.getElementById('lgo-shotmap-container');
  if (shotEl && d.shots && d.shots.length) {
    var subShots = d.shots.filter(function(s){return s.t<=t;});
    shotEl.innerHTML = buildShotMap(subShots, d.away, d.home);
  }
  var ctrlEl = document.getElementById('lgo-control-container');
  if (ctrlEl && last && last.hz != null && !isNaN(last.hz)) {
    var hz=Math.round(last.hz*1000)/10, az=Math.round((1-last.hz)*1000)/10;
    var hs2=Math.round((last.hs||0.5)*1000)/10, as2=Math.round((1-(last.hs||0.5))*1000)/10;
    ctrlEl.innerHTML = buildDualBar('Zone Control',az,hz,d.away,d.home,d.awayColor,d.homeColor)
      +buildDualBar('Shot Quality',as2,hs2,d.away,d.home,d.awayColor,d.homeColor);
  }
  var scrubEl = document.getElementById('lgo-scrub');
  if (scrubEl) { var pct=(val/(d.timeline.length-1)*100).toFixed(1); scrubEl.style.background='linear-gradient(to right,#3b82f6 '+pct+'%,rgba(255,255,255,0.1) '+pct+'%)'; }
  var wpEl = document.getElementById('lgo-wp-header');
  if (wpEl && last) {
    var homeWP = lgoPct(last.wp), awayWP = lgoPct(1-last.wp);
    wpEl.innerHTML = '<span style="color:#9ca3af">'+d.away+'</span> <span style="color:#f9fafb;font-weight:700">'+awayWP+'%</span>'
      +' <span style="color:#374151;margin:0 4px">·</span>'
      +'<span style="color:#f9fafb;font-weight:700">'+homeWP+'%</span> <span style="color:#9ca3af">'+d.home+'</span>';
  }
  var labelEl = document.getElementById('lgo-scrub-label');
  if (labelEl) {
    if (val >= d.timeline.length - 1) {
      labelEl.textContent = 'FINAL';
    } else {
      var gp = t<=1200?1:t<=2400?2:t<=3600?3:4, gs = t%1200, gm = Math.floor(gs/60), gc = gs%60;
      labelEl.textContent = 'P'+gp+' '+gm+':'+(gc<10?'0':'')+gc;
    }
  }
}

function buildSparkline(histData, team, liveVal) {
  const raw = (histData||[])
    .filter(d => (d.team||'').toUpperCase() === team.toUpperCase() && d.cup != null && d.cup !== '')
    .sort((a,b) => (a.date||'').localeCompare(b.date||''))
    .map(d => ({ date: d.date, val: parseFloat(d.cup) }))
    .filter(d => !isNaN(d.val));
  // Inject today's live cup value as the final point
  if (liveVal != null) {
    const today = new Date().toISOString().substring(0,10);
    const idx = raw.findIndex(d => d.date === today);
    if (idx >= 0) raw[idx].val = liveVal; else raw.push({ date: today, val: liveVal });
  }
  if (raw.length < 2) return '';
  // Filter to significant changes (>= 0.8pp), always keep first & last
  const THRESH = 0.8;
  const points = [raw[0]];
  for (let i = 1; i < raw.length - 1; i++) {
    if (Math.abs(raw[i].val - points[points.length-1].val) >= THRESH) points.push(raw[i]);
  }
  points.push(raw[raw.length-1]);
  if (points.length < 2) return '';
  const W = 200, H = 38, padX = 8, padY = 8;
  const vals = points.map(p => p.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 0.5;
  const xs = points.map((_, i) => padX + (i / (points.length - 1)) * (W - padX * 2));
  const ys = vals.map(v => padY + (H - padY * 2) * (1 - (v - min) / range));
  const trend = vals[vals.length-1] - vals[0];
  const color = trend > 0.2 ? '#4ade80' : trend < -0.2 ? '#f87171' : '#9ca3af';
  const poly = xs.map((x,i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `M${xs[0].toFixed(1)},${H} ` + xs.map((x,i)=>`L${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ') + ` L${xs[xs.length-1].toFixed(1)},${H} Z`;
  const dots = points.map((p,i) => `<circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${i===points.length-1?2.5:1.8}" fill="${color}"/>`).join('');
  const dateLabels = points.map((p,i) => {
    const md = (p.date||'').substring(5).replace('-','/');
    const anchor = i===0?'start':i===points.length-1?'end':'middle';
    return `<text x="${xs[i].toFixed(1)}" y="${H+9}" font-size="6.5" fill="#6b7280" text-anchor="${anchor}" font-family="monospace">${md}</text>`;
  }).join('');
  const valLabels = points.map((p,i) => {
    if (i!==0 && i!==points.length-1) return '';
    const anchor = i===0?'start':'end';
    return `<text x="${xs[i].toFixed(1)}" y="${(ys[i]-4).toFixed(1)}" font-size="6.5" fill="${color}" text-anchor="${anchor}" font-weight="700" font-family="sans-serif">${p.val.toFixed(1)}%</text>`;
  }).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H+14}" preserveAspectRatio="none" style="display:block;height:52px;margin-bottom:4px">
    <defs><linearGradient id="sg-${team}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#sg-${team})"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${valLabels}${dateLabels}
  </svg>`;
}

function formatGameTime(utcStr) {
  var d = new Date(utcStr);
  // NHL uses noon UTC as placeholder when game time isn't confirmed
  if (d.getUTCHours() === 12 && d.getUTCMinutes() === 0) return "TBD";
  var dET = new Date(d.getTime() - 4 * 3600000);
  var h = dET.getUTCHours(), m = dET.getUTCMinutes();
  var ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + (m ? ":" + String(m).padStart(2,"0") : "") + " " + ampm;
}

function isSeriesLive(gamesData, t1, t2) {
  if (!gamesData || !gamesData.length) return false;
  return gamesData.some(function(g) {
    return [g.away,g.home].indexOf(t1)>=0 && [g.away,g.home].indexOf(t2)>=0
      && (g.state==='LIVE'||g.state==='CRIT');
  });
}

function getGameBadge(gamesData, t1, t2) {
  if (!gamesData || !gamesData.length) return "";
  var ET_OFFSET = -4 * 3600000;
  var nowEt = new Date(Date.now() + ET_OFFSET);
  if (nowEt.getUTCHours() < 5) nowEt.setUTCDate(nowEt.getUTCDate() - 1);
  var todayEastern = nowEt.toISOString().substring(0, 10);
  for (var i = 0; i < gamesData.length; i++) {
    var g = gamesData[i];
    var teams = [g.away, g.home];
    if (teams.indexOf(t1) >= 0 && teams.indexOf(t2) >= 0) {
      var gameDate = new Date(new Date(g.startUTC).getTime() + ET_OFFSET).toISOString().substring(0, 10);
      if (gameDate !== todayEastern) continue;
      var state = g.state;
      if (state === "FUT" || state === "PRE") {
        return '<span class="game-badge">' + formatGameTime(g.startUTC) + '</span>';
      } else if (state === "LIVE" || state === "CRIT") {
        var as = g.awayScore !== null ? g.awayScore : 0;
        var hs = g.homeScore !== null ? g.homeScore : 0;
        var per = g.period ? " P"+g.period : "";
        return '<span class="game-badge live">' + g.away + " " + as + " · " + g.home + " " + hs + per + '</span>';
      } else if (state === "FINAL" || state === "OFF") {
        var as = g.awayScore !== null ? g.awayScore : 0;
        var hs = g.homeScore !== null ? g.homeScore : 0;

function buildWinProbChart(timeline, goals) {

        +'<td style="padding:5px 2px"><div style="display:flex;align-items:center;gap:3px">'+spill+(scorerName?'<span style="font-size:11px;color:#e5e7eb;font-family:\'Barlow Condensed\',sans-serif;font-weight:600">'+scorerName+'</span>':'')+'</div></td>'
        +'<td style="padding:5px 4px;font-size:11px;color:#9ca3af;font-family:\'Barlow Condensed\',sans-serif">'+sc+'</td>'

        +'</tr>';
    });
    html+='</table></div>';
  }
  html+='<div style="text-align:center;font-size:10px;color:#374151;font-family:\'Barlow Condensed\',sans-serif;padding-bottom:24px">Updated '+new Date().toLocaleTimeString()+(data.gameOver?'':' · refreshes every 30s')+'</div>';
  html+='</div>';

}

var PLAYER_COLORS = { CAT: '#ec4899', MIC: '#10b981', MAR: '#f59e0b', DAN: '#a855f7' };

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

function getActiveRound(parsed) {
  if (!parsed) return 1;
  if (parsed.r4 && parsed.r4.topTeam && parsed.r4.topTeam !== 'TBD') return 4;
  if ((parsed.r3||[]).some(function(s){return s&&s.topTeam&&s.topTeam!=='TBD';})) return 3;
  if ((parsed.r2||[]).every(function(s){return s&&s.topTeam&&s.topTeam!=='TBD';})) return 2;
  return 1;
}

function buildBracketGames(t1, t2, gamesData) {
  if (!gamesData || !gamesData.length) return '';
  var games = gamesData.filter(function(g) {
    return [g.away,g.home].indexOf(t1)>=0 && [g.away,g.home].indexOf(t2)>=0;
  }).sort(function(a,b){ return new Date(a.startUTC)-new Date(b.startUTC); });
  var rows = games.map(function(g, i) {
    var as = g.awayScore||0, hs = g.homeScore||0;
    var gn = '<span class="bc-gn">G' + (i+1) + '</span>';
    if (g.state==='OFF'||g.state==='FINAL') {
      var awayWin = as > hs, homeWin = hs > as;
      var awayStr = (awayWin ? '<span class="bc-win">' : '') + g.away + ' ' + as + (awayWin ? '</span>' : '');
      var homeStr = (homeWin ? '<span class="bc-win">' : '') + hs + ' ' + g.home + (homeWin ? '</span>' : '');
      return '<div class="bc-gr">' + gn + '<span>' + awayStr + ' · ' + homeStr + '</span></div>';
    } else if (g.state==='LIVE'||g.state==='CRIT') {
      return '<div class="bc-gr bc-gr-live">' + gn + '<span style="color:#f87171;font-size:9px;margin-right:2px">LIVE</span><span>' + g.away + ' ' + as + ' · ' + hs + ' ' + g.home + (g.period?' P'+g.period:'') + '</span></div>';
    } else {
      return null;
    }
  }).filter(Boolean).join('');
  return rows;
}

function toggleBracketCard(el) {

function getSeriesLeader(sr) {
  if (!sr || !sr.topTeam || sr.topTeam === 'TBD') return 'TBD';
  if (sr.topWins === 4) return sr.topTeam;
  if (sr.bottomWins === 4) return sr.bottomTeam;
  return sr.topTeam + '/' + sr.bottomTeam;
}
function predictedMatchup(s1, s2) {
  var t1 = getSeriesLeader(s1), t2 = getSeriesLeader(s2);
  if (t1 === 'TBD' && t2 === 'TBD') return null;
  return {topTeam: t1, bottomTeam: t2, topWins: 0, bottomWins: 0, isPredicted: true};
}
function augmentPartialR2(series, s1, s2) {
  if (!series || series.isPredicted) return series;
  var topTBD = !series.topTeam || series.topTeam === 'TBD';
  var botTBD = !series.bottomTeam || series.bottomTeam === 'TBD';
  if (!topTBD && !botTBD) return series;
  var knownTeam = topTBD ? series.bottomTeam : series.topTeam;
  var s1has = s1 && (s1.topTeam === knownTeam || s1.bottomTeam === knownTeam);
  var otherSeries = s1has ? s2 : s1;
  var pred = getSeriesLeader(otherSeries);
  if (!pred || pred === 'TBD') return series;
  var out = Object.assign({}, series);
  if (topTBD) out.topTeam = pred; else out.bottomTeam = pred;
  return out;
}

function buildBracketCard(s, gamesData, isLarge, shareMode, isCompact) {

  var gamesHtml = (!shareMode && gamesData) ? buildBracketGames(t1, t2, gamesData) : '';

  var t1win = w1 === 4, t2win = w2 === 4;

      + p1pill
      + '<span class="bc-wins' + (t1lead ? ' bc-lead' : '') + '">' + w1 + '</span>'
      + '</div>';
  var row2 = t2isTBD

function buildBracket(shareMode) {
  var st = _poolState;
  if (!st || !st.parsed) return '<div class="loading">Loading...</div>';
  var p = st.parsed;
  var r1w = p.r1w || [], r1e = p.r1e || [];
  var r2 = p.r2 || [null,null,null,null];
  var r3 = p.r3 || [null,null];
  var r4 = p.r4 || null;
  var gd = st.gamesData || [];
  function predBracket(s1, s2) {
    var s1done = s1 && (s1.topWins === 4 || s1.bottomWins === 4);
    var s2done = s2 && (s2.topWins === 4 || s2.bottomWins === 4);
    if (!s1done && !s2done) return null;
    return predictedMatchup(s1, s2);
  }
  var pr2 = [
    augmentPartialR2(r2[0] || predBracket(r1w[0], r1w[1]), r1w[0], r1w[1]),
    augmentPartialR2(r2[1] || predBracket(r1w[2], r1w[3]), r1w[2], r1w[3]),
    augmentPartialR2(r2[2] || predBracket(r1e[0], r1e[1]), r1e[0], r1e[1]),
    augmentPartialR2(r2[3] || predBracket(r1e[2], r1e[3]), r1e[2], r1e[3]),
  ];

  var ar = getActiveRound(p);
  var cw1 = ar === 1 ? '' : 'width:36px;flex:none';
  var cw2 = ar === 2 ? 'flex:1;width:auto' : (ar > 2 ? 'width:50px' : '');
  var cw3 = ar === 3 ? 'width:90px' : (ar > 3 ? 'width:50px' : '');
  var cw4 = ar === 4 ? 'width:72px' : '';
  function c(s, round) { return buildBracketCard(s, gd, ar===round, shareMode, round < ar); }
  function cl(s) { return buildBracketCard(s, gd, ar===1, shareMode, ar > 1); }

  var shareBtn = shareMode ? '' : '<button onclick="showBracketShareOverlay()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;font-size:10px;padding:3px 8px;border-radius:8px;cursor:pointer">📸</button>';
  return '<div class="bracket-wrap">'
    + '<div class="bracket-conf-labels"><span class="bracket-conf-label">Western Conference</span>' + shareBtn + '<span class="bracket-conf-label">Eastern Conference</span></div>'
    + '<div class="bracket-half">'
    + '<div class="bc-half-group">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1w[0]) + cl(r1w[1]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[0], 2) + '</div>'
    + '</div>'
    + '<div class="bc-center-gap"></div>'
    + '<div class="bc-half-group" style="flex-direction:row-reverse">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1e[0]) + cl(r1e[1]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[2], 2) + '</div>'
    + '</div>'
    + '</div>'
    + '<div class="bracket-middle">'
    + '<div class="bc-cf-col"><div class="bc-round-label">Conf Finals</div><div style="' + cw3 + '">' + c(r3[0], 3) + '</div></div>'
    + '<div class="bc-scf-col" style="' + cw4 + '"><div class="bc-trophy">🏆</div><div class="bc-scf-label">Stanley Cup<br>Final</div>' + c(r4, 4) + '</div>'
    + '<div class="bc-cf-col"><div class="bc-round-label">Conf Finals</div><div style="' + cw3 + '">' + c(r3[1], 3) + '</div></div>'
    + '</div>'
    + '<div class="bracket-half" style="margin-top:2px">'
    + '<div class="bc-half-group">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1w[2]) + cl(r1w[3]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[1], 2) + '</div>'
    + '</div>'
    + '<div class="bc-center-gap"></div>'
    + '<div class="bc-half-group" style="flex-direction:row-reverse">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1e[2]) + cl(r1e[3]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[3], 2) + '</div>'

async function render() {
  document.getElementById("subtitle").textContent = "Refreshing...";
  try {
    const [{ oddsMap, roundOdds }, nhlRaw, gamesRaw, historyData, leaders] = await Promise.all([
      fetchOdds(), fetchNHL(), fetchAllGames(), fetchHistory(), fetchScoringLeaders()
    ]);

    // Odds delta — walk back per team to find most recent snapshot where odds actually differed
    var deltaMap = {};
    try {
      if (historyData && historyData.length > 0) {
        var todayStr = new Date().toISOString().substring(0,10);
        var histDates = [...new Set(historyData.map(r => r.date).filter(Boolean))].sort()
          .filter(d => d < todayStr);
        for (var t in oddsMap) {
          var cur = parseFloat((oddsMap[t]||'0%').replace('%',''));
          for (var di = histDates.length - 1; di >= 0; di--) {
            var snap = historyData.find(r => r.date === histDates[di] && r.team && r.team.toUpperCase() === t);
            if (snap) {
              var prev = parseFloat(snap.cup) || 0;
              var d = parseFloat((cur - prev).toFixed(1));
              if (Math.abs(d) >= 0.1) { deltaMap[t] = d; break; }
            }
          }
        }
      }
    } catch(e) {}

    const parsed = parseSeries(nhlRaw) || fallbackParsed();
    const { r1w, r1e, r2, r3, r4 } = parsed;

    const r2disp = [
      augmentPartialR2(r2[0] || predictedMatchup(r1w[0], r1w[1]), r1w[0], r1w[1]),
      augmentPartialR2(r2[1] || predictedMatchup(r1w[2], r1w[3]), r1w[2], r1w[3]),
      augmentPartialR2(r2[2] || predictedMatchup(r1e[0], r1e[1]), r1e[0], r1e[1]),
      augmentPartialR2(r2[3] || predictedMatchup(r1e[2], r1e[3]), r1e[2], r1e[3]),
    ];

    const r2HasTeams = r2.some(s => s && s.topTeam !== 'TBD');
    const r2AllTeams = r2.every(s => s && s.topTeam !== 'TBD' && s.bottomTeam !== 'TBD');
    const r3HasTeams = r3.some(s => s && s.topTeam !== 'TBD');
    const r4HasTeams = r4 && r4.topTeam !== 'TBD';

    const confLabels = `<div class="conf-labels">
      <div class="conf-label">Western Conference</div>
      <div class="conf-label">Eastern Conference</div>
    </div>`;

    const sc = (s, lbl, g, rNum) => seriesCard(s, lbl, oddsMap, g, deltaMap, roundOdds, rNum, historyData);

    let html = makeRoundSection('r1', 'Round 1',
      confLabels + `<div class="four-col">
        ${r1w.map((s,i) => sc(s,"Round 1",gamesRaw,1) + sc(r1e[i],"Round 1",gamesRaw,1)).join("")}
      </div>`, r2AllTeams);

    html += makeRoundSection('r2', 'Round 2',
      confLabels + `<div class="four-col">
        ${sc(r2disp[0],"West R2",gamesRaw,2)}${sc(r2disp[2],"East R2",gamesRaw,2)}${sc(r2disp[1],"West R2",gamesRaw,2)}${sc(r2disp[3],"East R2",gamesRaw,2)}
      </div>`, !r2HasTeams);

    html += makeRoundSection('r3', 'Conference Finals',
      `<div class="two-col">
        ${sc(r3[0],"West Conference Final",gamesRaw,3)}
        ${sc(r3[1],"East Conference Final",gamesRaw,3)}
      </div>`, !r3HasTeams);

    html += makeRoundSection('r4', 'Stanley Cup Final',
      `<div class="one-col">${sc(r4,"Stanley Cup Final",gamesRaw,4)}</div>`,
      !r4HasTeams);

    document.getElementById("main").innerHTML = html;

    var pieTotals = Object.entries(POOL).map(function(player_teams) {
      var player=player_teams[0], teams=player_teams[1];
      var total=0;
      for(var i=0;i<teams.length;i++) total+=parseFloat((oddsMap[teams[i]]||"0%").replace("%",""));
      return {player:player, name:PLAYER_NAMES[player], total:total, teams:teams};
    }).sort(function(a,b){return b.total-a.total;});
    var pieSvg = buildPieChart(pieTotals);
    _poolState = { pieTotals, pieSvg, oddsMap, roundOdds, historyData, parsed, gamesData: gamesRaw, deltaMap, leaders };
    var legendEl = document.getElementById("legend-pie-wrap");
    if(legendEl) legendEl.innerHTML = _buildLegendPieHtml(pieTotals, pieSvg);
    document.getElementById("tonight-wrap").innerHTML = buildOnTheClock(gamesRaw, oddsMap);
    document.getElementById("standings-wrap").innerHTML = buildStandings(oddsMap, historyData) + buildTeamOdds(oddsMap, roundOdds, historyData) + buildScoringLeaders(leaders, oddsMap);

    const oddsLoaded = Object.keys(oddsMap).length > 0;
    document.getElementById("subtitle").textContent =
      `Live NHL scores + ${oddsLoaded?"MoneyPuck odds":"(odds unavailable)"} · Updated ${new Date().toLocaleTimeString()}`;

  } catch(e) {
    document.getElementById("main").innerHTML = `<div class="error">Error: ${e.message}</div>`;
    document.getElementById("subtitle").textContent = "Failed to load";
  }
}

render();
setInterval(render, 300000);
</script>

/* ── Pull-to-refresh ── */
(function() {
  var pill, icon, wrap;
  var startY = 0, startX = 0, lastY = 0;
  var active = false, busy = false;
  var THRESH = 62;  // px the page must move to trigger
  var MAX    = 115; // rubber-band cap (more room to pull)
  var HOLD   = 62;  // translateY held while refreshing

  function init() {
    pill = document.getElementById('ptr-pill');
    icon = document.getElementById('ptr-icon');
    wrap = document.getElementById('page-wrap');
    document.addEventListener('touchstart', ts, { passive: true });
    document.addEventListener('touchmove',  tm, { passive: false });
    document.addEventListener('touchend',   te, { passive: true });
    document.addEventListener('touchcancel', tc, { passive: true });
  }

  function overlayOpen() {
    var kids = document.body.children;
    for (var i = 0; i < kids.length; i++) {
      var id = kids[i].id;
      if (id === 'ptr-pill' || id === 'page-wrap') continue;
      if (parseInt(window.getComputedStyle(kids[i]).zIndex) >= 10000) return true;
    }
    return false;
  }

  function ts(e) {
    if (busy) return;
    startY = lastY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    active = false;
  }

  function tm(e) {
    if (busy) return;
    var t  = e.touches[0];
    var dy = t.clientY - startY;
    var dx = Math.abs(t.clientX - startX);
    lastY  = t.clientY;

    if (!active) {
      if (window.scrollY > 10 || dy < 10 || dx > dy * 0.65 || overlayOpen()) return;
      active = true;
    }
    e.preventDefault();

    // Exponential damping: responsive at first, resists more as you pull further
    var v    = MAX * (1 - Math.exp(-dy / (MAX * 1.05)));
    var prog = Math.min(v / THRESH, 1);

    // The page slides down, revealing the pill behind it
    wrap.style.transition = 'none';
    wrap.style.transform  = 'translateY(' + v + 'px)';

    icon.style.transform = 'rotate(' + (prog * 180) + 'deg)';
    icon.style.color     = v >= THRESH ? 'var(--text)' : 'var(--muted)';
  }

  function te() {
    if (!active || busy) { active = false; return; }
    active = false;
    var dy = lastY - startY;
    var v  = MAX * (1 - Math.exp(-dy / (MAX * 1.05)));
    if (v >= THRESH) go(); else snap();
  }

  function tc() { active = false; if (!busy) snap(); }

  function snap() {
    wrap.style.transition = 'transform 0.42s cubic-bezier(0.25,1,0.5,1)';
    wrap.style.transform  = 'translateY(0)';
    icon.style.transform  = '';
    icon.style.color      = 'var(--muted)';
  }

  function go() {
    busy = true;
    wrap.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
    wrap.style.transform  = 'translateY(' + HOLD + 'px)';
    icon.style.transform  = '';
    icon.style.color      = 'var(--text)';
    icon.className        = 'ptr-spin';

    render().then(done).catch(function() { busy = false; snap(); });
  }

  function done() {
    icon.className   = '';
    icon.textContent = '✓';
    icon.style.color = '#22c55e';
    setTimeout(function() {
      wrap.style.transition = 'transform 0.58s cubic-bezier(0.25,1,0.5,1)';
      wrap.style.transform  = 'translateY(0)';
      setTimeout(function() {
        icon.textContent  = '↻';
        icon.style.color  = 'var(--muted)';
        busy = false;
      }, 600);
    }, 850);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
